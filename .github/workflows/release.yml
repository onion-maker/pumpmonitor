name: Release APK

# 推送 v 開頭的 tag 時自動觸發 (例如 v1.4.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web (Vite)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # ⚠️ 從 tag 名稱提取版本號，自動更新 build.gradle 中的 versionName 與 versionCode
      #   tag "v1.4.0" → versionName = "1.4.0", versionCode = 年份週數 (如 2026W28 = 260728)
      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION_NAME=${TAG_NAME#v}
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          # versionCode: YYMMDD 格式，以當前 UTC 日期計算
          VERSION_CODE=$(date -u +'%y%m%d')
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Update version in build.gradle
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.VERSION_CODE }}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.VERSION_NAME }}\"/" android/app/build.gradle

      - name: Set up keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build release APK
        working-directory: android
        run: |
          python3 -c "
          import re
          path = 'app/build.gradle'
          with open(path, 'r') as f:
              content = f.read()

          # 注入 signingConfigs 區段（放在 android { 之後）
          signing = '''
          signingConfigs {
              release {
                  storeFile file('release.keystore')
                  storePassword System.getenv('KEYSTORE_PASS')
                  keyAlias System.getenv('KEY_ALIAS')
                  keyPassword System.getenv('KEY_PASS')
              }
          }\n'''
          content = re.sub(r'(android\s*\{)', r'\1\n' + signing, content, count=1)

          # 在 release buildType 中加入 signingConfig signingConfigs.release
          content = re.sub(
              r'(release\s*\{\n\s*minifyEnabled)',
              r'signingConfig signingConfigs.release\n            \1',
              content
          )

          with open(path, 'w') as f:
              f.write(content)
          print('signingConfig injected')
          "
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: ${{ steps.version.outputs.TAG_NAME }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}